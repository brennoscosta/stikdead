<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <script>
      // bloqueio de zoom (pinça, ctrl+roda, ctrl+/-)
      document.addEventListener('wheel', (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && ['+', '-', '=', '0'].includes(e.key)) e.preventDefault();
      });
      document.addEventListener('gesturestart', (e) => e.preventDefault());
      document.addEventListener('gesturechange', (e) => e.preventDefault());
      document.addEventListener('gestureend', (e) => e.preventDefault());
      // double-tap zoom (iOS): bloqueia toque duplo APENAS fora de áreas interativas
      // (preventDefault no touchend cancela a cadeia de pointer events no WebKit —
      //  nos botões da luta isso travava o spam de golpes)
      let ultimoToque = 0;
      document.addEventListener('touchend', (e) => {
        const interativo = e.target.closest &&
          e.target.closest('button, a, input, select, textarea, canvas, [role="button"], .bt-controls, .kh-keys');
        const agora = Date.now();
        if (!interativo && agora - ultimoToque <= 300) e.preventDefault();
        ultimoToque = agora;
      }, { passive: false });
      // toque com 2+ dedos = tentativa de pinça: bloqueia na origem
      document.addEventListener('touchmove', (e) => {
        if (e.touches && e.touches.length > 1) e.preventDefault();
      }, { passive: false });
      // se o zoom escapar mesmo assim, devolve a escala ao normal
      const destravaZoom = () => {
        const vv = window.visualViewport;
        if (vv && Math.abs(vv.scale - 1) > 0.01) window.scrollTo(0, 0);
      };
      window.addEventListener('resize', destravaZoom);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', destravaZoom);
        window.visualViewport.addEventListener('scroll', destravaZoom);
      }
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="STIKDEAD" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>STIKDEAD — Lute. Morra. Evolua.</title>
