# STIKDEAD :: /etc/nginx/sites-available/stikdead.com
# Após copiar: ln -s /etc/nginx/sites-available/stikdead.com /etc/nginx/sites-enabled/
server {
    listen 80;
    server_name stikdead.com www.stikdead.com;

    root /opt/stikdead/client/dist;
    index index.html;

    # SPA: qualquer rota cai no index
    location / {
        try_files $uri /index.html;
    }

    # assets com cache longo (têm hash no nome)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }
}
